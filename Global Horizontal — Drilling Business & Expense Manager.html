<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Global Horizontal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0B1120;--bg2:#0F1626;--card:#141C2E;--card-hover:#1A2338;
  --border:#232D45;--text:#E8ECF4;--text-dim:#8B95AB;--text-dim2:#5D6987;
  --accent:#F0A63A;--accent-dark:#C9861F;--accent-glow:rgba(240,166,58,0.25);
  --green:#22C55E;--green-dim:rgba(34,197,94,0.14);--green-bd:rgba(34,197,94,0.35);
  --red:#F87171;--red-dim:rgba(248,113,113,0.14);--red-bd:rgba(248,113,113,0.35);
  --blue:#60A5FA;--blue-dim:rgba(96,165,250,0.14);
  --radius:16px;--radius-sm:10px;
}
html,body{height:100%;overflow-x:hidden;}
body{
  background:radial-gradient(ellipse at top,#131c33 0%,#0B1120 55%);
  color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  min-height:100vh;-webkit-font-smoothing:antialiased;
}
button,input,select,textarea{font-family:inherit;}
.lang-ur,.lang-ur input,.lang-ur select,.lang-ur button,.lang-ur textarea{
  font-family:'Jameel Noori Nastaleeq','Noto Nastaliq Urdu','Noto Sans Arabic','Segoe UI',Tahoma,sans-serif;
  line-height:1.9;
}
[dir="rtl"] body{direction:rtl;}

.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.login-card{width:100%;max-width:380px;background:linear-gradient(180deg,var(--card),var(--bg2));border:1px solid var(--border);border-radius:20px;padding:36px 28px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.4);position:relative;}
.login-logo{font-size:44px;margin-bottom:8px;filter:drop-shadow(0 0 20px var(--accent-glow));}
.login-card h1{font-size:22px;letter-spacing:2px;font-weight:800;background:linear-gradient(90deg,var(--accent),#FFD98A);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:4px;}
.urdu-brand{font-size:15px;color:var(--accent);margin-bottom:6px;display:none;}
.tagline{color:var(--text-dim);font-size:13px;margin-bottom:28px;}
.login-card label{display:block;text-align:left;font-size:12px;color:var(--text-dim);margin-bottom:6px;font-weight:600;}
[dir="rtl"] .login-card label{text-align:right;}
.login-card input{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:13px 14px;border-radius:var(--radius-sm);font-size:15px;margin-bottom:16px;outline:none;transition:border-color .2s;}
.login-card input:focus{border-color:var(--accent);}
.btn-primary{width:100%;background:linear-gradient(90deg,var(--accent),var(--accent-dark));color:#1a1200;border:none;padding:14px;border-radius:var(--radius-sm);font-size:15px;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .15s;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 20px var(--accent-glow);}
.hint{font-size:11.5px;color:var(--text-dim2);margin-top:14px;line-height:1.6;}
.lang-toggle-btn{position:absolute;top:18px;right:18px;background:var(--bg2);border:1px solid var(--border);color:var(--text-dim);padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;}
[dir="rtl"] .lang-toggle-btn{right:auto;left:18px;}

.app-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:rgba(11,17,32,0.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20;}
.header-left{display:flex;align-items:center;gap:8px;}
.header-logo{font-size:22px;}
.header-title{font-weight:800;font-size:14px;letter-spacing:1px;color:var(--accent);}
.header-right{display:flex;align-items:center;gap:10px;position:relative;}
.lang-toggle-btn-sm{background:var(--card);border:1px solid var(--border);color:var(--text-dim);padding:5px 10px;border-radius:16px;font-size:11px;cursor:pointer;}
.user-chip{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);padding:6px 10px;border-radius:20px;cursor:pointer;font-size:12px;}
.user-avatar{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-dark));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#1a1200;flex-shrink:0;}
.user-dropdown{position:absolute;top:44px;right:0;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:8px;width:230px;box-shadow:0 12px 30px rgba(0,0,0,0.5);z-index:30;}
[dir="rtl"] .user-dropdown{right:auto;left:0;}
.user-dropdown-label{font-size:10px;color:var(--text-dim2);padding:6px 8px;text-transform:uppercase;letter-spacing:1px;}
.user-dropdown-item{padding:9px 10px;border-radius:8px;font-size:13px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:6px;}
.user-dropdown-item:hover{background:var(--card-hover);}
.user-dropdown-item.active{background:var(--accent-glow);color:var(--accent);}
.role-tag{font-size:9px;background:var(--bg2);padding:2px 6px;border-radius:6px;color:var(--text-dim);white-space:nowrap;}
.logout-row{border-top:1px solid var(--border);margin-top:6px;padding-top:9px;color:var(--red);justify-content:center;}

.balance-strip{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:14px 16px 4px;}
.bstat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 8px;text-align:center;}
.bstat .lbl{font-size:9.5px;color:var(--text-dim);display:block;margin-bottom:4px;}
.bstat .val{font-size:14px;font-weight:800;}
.bstat.balance .val{color:var(--accent);}
.bstat.income .val{color:var(--green);}
.bstat.expense .val{color:var(--red);}

main{padding:16px 16px 90px;max-width:640px;margin:0 auto;animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

.info-banner{background:var(--blue-dim);border:1px solid rgba(96,165,250,0.3);color:var(--text-dim);padding:12px 30px 12px 14px;border-radius:var(--radius-sm);font-size:11.5px;line-height:1.6;margin-bottom:16px;position:relative;}
[dir="rtl"] .info-banner{padding:12px 14px 12px 30px;}
.info-banner .close-x{position:absolute;top:8px;right:10px;cursor:pointer;color:var(--text-dim);font-size:13px;}
[dir="rtl"] .info-banner .close-x{right:auto;left:10px;}

.view-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:8px;}
.view-header h2{font-size:19px;font-weight:800;}
.btn-add{background:var(--accent);color:#1a1200;border:none;padding:8px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}

.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 8px;text-align:center;}
.stat-card.highlight{background:linear-gradient(160deg,var(--card),rgba(240,166,58,0.08));border-color:var(--accent-dark);}
.stat-label{font-size:9.5px;color:var(--text-dim);display:block;margin-bottom:6px;}
.stat-value{font-size:16px;font-weight:800;}

.compare-bars{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:18px;}
.compare-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;font-size:12px;}
.compare-row:last-child{margin-bottom:0;}
.compare-row>span:first-child{width:56px;color:var(--text-dim);flex-shrink:0;}
.compare-row>span:last-child{width:95px;text-align:right;font-weight:700;flex-shrink:0;}
[dir="rtl"] .compare-row>span:last-child{text-align:left;}
.bar-track{flex:1;height:8px;background:var(--bg2);border-radius:6px;overflow:hidden;}
.bar-fill{height:100%;border-radius:6px;transition:width .6s ease;}
.bar-fill.green{background:linear-gradient(90deg,#16A34A,var(--green));}
.bar-fill.red{background:linear-gradient(90deg,#DC2626,var(--red));}

.quick-actions{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap;}
.quick-actions button{flex:1;min-width:100px;background:var(--card);border:1px solid var(--border);color:var(--text);padding:11px 8px;border-radius:var(--radius-sm);font-size:11.5px;font-weight:600;cursor:pointer;}
.quick-actions button:hover{border-color:var(--accent);}

h3.section-title{font-size:12.5px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin:20px 0 10px;}

.card-list{display:flex;flex-direction:column;gap:10px;}
.item-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;}
.item-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.item-title{font-weight:700;font-size:14px;}
.item-sub{font-size:11.5px;color:var(--text-dim);margin-top:2px;}
.item-amount{font-weight:800;font-size:15px;white-space:nowrap;}
.item-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;font-size:10.5px;color:var(--text-dim);}
.item-meta span{background:var(--bg2);padding:3px 8px;border-radius:8px;}

.badge{font-size:9.5px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;}
.badge.verified,.badge.completed_paid{background:var(--green-dim);color:var(--green);border:1px solid var(--green-bd);}
.badge.pending,.badge.completed_pending{background:var(--accent-glow);color:var(--accent);border:1px solid var(--accent-dark);}
.badge.disputed{background:var(--red-dim);color:var(--red);border:1px solid var(--red-bd);}
.badge.in_progress{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(96,165,250,0.35);}
.badge.income{background:var(--green-dim);color:var(--green);}
.badge.expense{background:var(--red-dim);color:var(--red);}

.receipt-thumb{width:52px;height:52px;object-fit:cover;border-radius:8px;border:1px solid var(--border);cursor:pointer;}
.no-receipt{font-size:11px;color:var(--text-dim2);font-style:italic;}
.empty-state{text-align:center;padding:50px 20px;color:var(--text-dim2);font-size:13px;}

.verify-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
.verify-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.verify-details{display:flex;flex-direction:column;gap:3px;font-size:12px;color:var(--text-dim);margin-bottom:10px;}
.verify-actions{display:flex;gap:8px;margin-top:10px;}
.btn-verify{flex:1;background:var(--green-dim);border:1px solid var(--green-bd);color:var(--green);padding:9px;border-radius:var(--radius-sm);font-weight:700;font-size:12px;cursor:pointer;}
.btn-reject{flex:1;background:var(--red-dim);border:1px solid var(--red-bd);color:var(--red);padding:9px;border-radius:var(--radius-sm);font-weight:700;font-size:12px;cursor:pointer;}
.own-note{background:var(--bg2);color:var(--text-dim);font-size:11px;padding:9px;border-radius:var(--radius-sm);text-align:center;margin-top:8px;}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(11,17,32,0.95);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;padding:8px 4px calc(8px + env(safe-area-inset-bottom));z-index:20;}
.nav-item{position:relative;flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;cursor:pointer;color:var(--text-dim2);border:none;background:none;font-size:9px;font-weight:600;}
.nav-item svg{width:19px;height:19px;}
.nav-item.active{color:var(--accent);}
.nav-badge{position:absolute;top:0;right:18%;background:var(--red);color:white;font-size:8px;min-width:14px;height:14px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(3px);display:flex;align-items:flex-end;justify-content:center;z-index:50;}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;padding:20px;animation:slideUp .25s ease;}
@keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-title{font-size:17px;font-weight:800;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;}
.modal-close{background:var(--card);border:1px solid var(--border);width:30px;height:30px;border-radius:50%;color:var(--text-dim);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:6px;font-weight:600;}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:11px 12px;border-radius:var(--radius-sm);font-size:14px;outline:none;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius-sm);padding:20px;text-align:center;cursor:pointer;position:relative;font-size:12.5px;color:var(--text-dim);}
.upload-zone:hover{border-color:var(--accent);}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.upload-preview{width:100%;max-height:170px;object-fit:contain;border-radius:8px;margin-bottom:4px;display:block;}
.btn-extract{width:100%;background:var(--blue-dim);color:var(--blue);border:1px solid rgba(96,165,250,0.35);padding:10px;border-radius:var(--radius-sm);font-weight:700;font-size:12px;cursor:pointer;margin-top:8px;}
.extract-status{font-size:11px;text-align:center;margin-top:8px;min-height:14px;}
.extract-status.extracting{color:var(--blue);}
.extract-status.success{color:var(--green);}
.extract-status.error{color:var(--red);}
.btn-submit{width:100%;background:linear-gradient(90deg,var(--accent),var(--accent-dark));color:#1a1200;border:none;padding:14px;border-radius:var(--radius-sm);font-weight:800;font-size:14px;cursor:pointer;margin-top:6px;}
.receipt-modal-img{width:100%;max-height:70vh;object-fit:contain;border-radius:12px;background:#000;display:block;}

.member-row{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;gap:8px;}
.member-row-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.mini-remove{background:var(--red-dim);border:1px solid var(--red-bd);color:var(--red);width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:12px;flex-shrink:0;}
.cat-report-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px;}
.cat-report-row:last-child{border-bottom:none;}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--accent);color:var(--text);padding:11px 20px;border-radius:20px;font-size:13px;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,0.4);white-space:nowrap;}
</style>
</head>
<body>

<div id="loginView" class="login-screen">
  <div class="login-card">
    <button id="langToggleLogin" class="lang-toggle-btn">اردو</button>
    <div class="login-logo">⛏️</div>
    <h1>GLOBAL HORIZONTAL</h1>
    <p class="urdu-brand" id="urduBrandLogin">گلوبل ہورائزنٹل</p>
    <p class="tagline" id="loginTagline">Business & Expense Management</p>
    <label id="lblPhone">Phone Number</label>
    <input id="phoneInput" type="tel" placeholder="03XX-XXXXXXX" />
    <button id="btnLogin" class="btn-primary">Login</button>
    <p class="hint" id="loginHint"></p>
  </div>
</div>

<div id="appView" style="display:none">
  <header class="app-header">
    <div class="header-left">
      <span class="header-logo">⛏️</span>
      <span class="header-title">GLOBAL HORIZONTAL</span>
    </div>
    <div class="header-right">
      <button id="langToggleApp" class="lang-toggle-btn-sm">اردو</button>
      <div id="userMenu"></div>
    </div>
  </header>
  <div class="balance-strip" id="balanceStrip"></div>
  <main id="content"></main>
  <nav class="bottom-nav" id="bottomNav"></nav>
</div>

<div class="modal-overlay" id="modalOverlay" style="display:none">
  <div class="modal-box" id="modalBox"></div>
</div>

<div class="toast" id="toast" style="display:none"></div>

function t(k){ return (tr[st.lang] && tr[st.lang][k]) || k; }
function esc(s){ return (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtMoney(n){ return 'Rs. ' + Math.round(n||0).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ','); }
function todayISO(){ return new Date().toISOString().split('T')[0]; }
function fmtDate(d){
  if(!d) return '-';
  const dt = new Date(d+'T00:00:00');
  if (isNaN(dt.getTime())) return d;
  try { return dt.toLocaleDateString(st.lang==='ur'?'ur-PK':'en-GB', {day:'2-digit',month:'short',year:'numeric'}); }
  catch(e){ const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return dt.getDate()+' '+mo[dt.getMonth()]+' '+dt.getFullYear(); }
}
function getMember(id){ return st.members.find(m=>m.id===id); }
function memberTitle(m){ return st.lang==='ur' ? (m.titleUr||m.title||'') : (m.title||''); }
function getMemberName(id){ const m=getMember(id); return m? m.name : t('newMemberDefault'); }
function getSite(id){ return st.sites.find(s=>s.id===id); }
function getSiteName(id){ const s=getSite(id); return s? esc(s.name) : '-'; }
function calcTotals(){
  const totalIncome = st.incomeTx.filter(x=>x.status==='verified').reduce((a,b)=>a+b.amount,0);
  const totalExpense = st.expenseTx.filter(x=>x.status==='verified').reduce((a,b)=>a+b.amount,0);
  const pendingCount = st.incomeTx.filter(x=>x.status==='pending').length + st.expenseTx.filter(x=>x.status==='pending').length;
  return {totalIncome, totalExpense, balance: totalIncome-totalExpense, pendingCount};
}

  st.expenseTx.filter(x=>x.status==='verified').forEach(x=>{ catTotals[x.category]=(catTotals[x.category]||0)+x.amount; });
  const catRows = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
  const allTx = [...st.incomeTx, ...st.expenseTx].sort((a,b)=>new Date(b.date)-new Date(a.date));
  return `
    <div class="view-header"><h2>${t('admin')}</h2></div>
    <h3 class="section-title">${t('members')} (${st.members.length})</h3>
    <div class="card-list" style="margin-bottom:10px">${st.members.map(m=>`
        <div class="member-row">
          <div><div class="item-title">${esc(m.name)}</div><div class="item-sub">${esc(memberTitle(m))} · ${esc(m.phone)}</div></div>
          <div class="member-row-actions">
            <span class="badge ${m.role==='admin'?'verified':'in_progress'}">${m.role==='admin'?t('admin'):t('role')}</span>
            <button class="mini-remove" data-action="removeMember" data-id="${m.id}" title="${t('removeMember')}">✕</button>
          </div>
        </div>`).join('')}</div>
    <button class="btn-add" style="width:100%;margin-bottom:20px" data-action="openModal" data-modal="member">+ ${t('addMember')}</button>
    <h3 class="section-title">${t('reportsByCategory')}</h3>
    <div class="item-card" style="margin-bottom:20px">${catRows.length ? catRows.map(([cat,amt])=>`<div class="cat-report-row"><span>${t(cat)}</span><span style="font-weight:700">${fmtMoney(amt)}</span></div>`).join('') : `<div class="empty-state">${t('noData')}</div>`}</div>
    <h3 class="section-title">${t('allTransactions')} (${allTx.length})</h3>
    <div class="card-list" style="margin-bottom:20px">${allTx.map(renderActivityRow).join('')}</div>
    <button class="btn-add" style="width:100%;background:var(--red-dim);color:var(--red);border:1px solid var(--red-bd)" data-action="resetDemo">↺ ${t('resetDemo')}</button>`;
}

function openModal(name, presetSiteId){
  st.modalOpen = name;
  st.modalData = {presetSiteId: presetSiteId||null};
  document.getElementById('modalOverlay').style.display='flex';
  renderModal();
}
function closeModal(){ document.getElementById('modalOverlay').style.display='none'; st.modalOpen=null; }
function renderModal(){
  const box = document.getElementById('modalBox');
  if (st.modalOpen==='site') box.innerHTML = modalSiteHTML();
  else if (st.modalOpen==='income') box.innerHTML = modalIncomeHTML();
  else if (st.modalOpen==='expense') box.innerHTML = modalExpenseHTML();
  else if (st.modalOpen==='member') box.innerHTML = modalMemberHTML();
  else if (st.modalOpen==='receipt') box.innerHTML = modalReceiptHTML();
}

function resizeImage(dataUrl, maxWidth){
  return new Promise((resolve)=>{
    const img = new Image();
    img.onload = ()=>{
      let w=img.width, h=img.height;
      if (w>maxWidth){ h = Math.round(h*(maxWidth/w)); w = maxWidth; }
      const canvas = document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      resolve(canvas.toDataURL('image/jpeg', 0.85));
    };
    img.onerror = ()=> resolve(dataUrl);
    img.src = dataUrl;
  });
}
async function handleFileSelect(e, prefix){
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async ()=>{
    const resized = await resizeImage(reader.result, 900);
    st.modalData[prefix+'Receipt'] = resized;
    document.getElementById(prefix+'UploadZone').innerHTML = `<img class="upload-preview" src="${resized}"><input type="file" accept="image/*" id="${prefix}FileInput" />`;
    document.getElementById(prefix+'ExtractBtn').style.display='block';
  };
  reader.readAsDataURL(file);
}
async function runExtraction(prefix){
  const statusEl = document.getElementById(prefix+'ExtractStatus');
  const dataUrl = st.modalData[prefix+'Receipt'];
  if (!dataUrl) return;
  statusEl.textContent = t('extracting'); statusEl.className='extract-status extracting';
  const cap = prefix==='inc' ? 'Inc' : 'Exp';
  try {
    const base64 = dataUrl.split(',')[1];
    const mediaType = dataUrl.substring(5, dataUrl.indexOf(';'));
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-6', max_tokens:1000,
        messages:[{ role:'user', content:[
          {type:'image', source:{type:'base64', media_type:mediaType, data:base64}},
          {type:'text', text:'This image is a bank deposit slip, fund transfer receipt, mobile wallet screenshot, or cheque. Extract the key details and reply with ONLY raw JSON and nothing else (no markdown fences, no explanation), in exactly this shape: {"amount": <number without commas or currency symbols, or null>, "date": "<YYYY-MM-DD, or null>", "method": "<one of Cash, Bank Transfer, JazzCash, EasyPaisa, Cheque, Online Banking, or null>"}'}
        ]}]
      })
    });
    const data = await resp.json();
    const textBlock = (data.content||[]).find(b=>b.type==='text');
    if (!textBlock) throw new Error('no text');
    const clean = textBlock.text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);
    if (parsed.amount) document.getElementById('f'+cap+'Amount').value = parsed.amount;
    if (parsed.date) document.getElementById('f'+cap+'Date').value = parsed.date;
    if (parsed.method){
      const map = {'Cash':'cash','Bank Transfer':'banktransfer','JazzCash':'jazzcash','EasyPaisa':'easypaisa','Cheque':'cheque','Online Banking':'onlinebanking'};
      const key = map[parsed.method];
      if (key) document.getElementById('f'+cap+'Method').value = key;
    }
    statusEl.textContent = '✓ ' + t('extracted'); statusEl.className='extract-status success';
  } catch(err){
    statusEl.textContent = t('extractFailed'); statusEl.className='extract-status error';
  }
}

function submitSite(){
  const name = document.getElementById('fSiteName').value.trim();
  const location = document.getElementById('fSiteLocation').value.trim();
  const client = document.getElementById('fSiteClient').value.trim();
  const category = document.getElementById('fSiteCategory').value;
  const amount = parseFloat(document.getElementById('fSiteAmount').value);
  const date = document.getElementById('fSiteDate').value;
  const status = document.getElementById('fSiteStatus').value;
  if (!name || !location || !client || !amount || !date){ showToast(t('requiredField')); return; }
  st.sites.push({id:uid('s'), name, location, client, category, expectedAmount:amount, startDate:date, status});
  closeModal(); switchTab('sites'); showToast('✓ ' + name);
}
function submitIncome(){
  const siteId = document.getElementById('fIncSite').value;
  const amount = parseFloat(document.getElementById('fIncAmount').value);
  const date = document.getElementById('fIncDate').value;
  const method = document.getElementById('fIncMethod').value;
  if (!siteId || !amount || !date){ showToast(t('requiredField')); return; }
  st.incomeTx.push({id:uid('i'), kind:'income', siteId, amount, date, method, receipt:st.modalData.incReceipt||null, submittedBy:st.activeUser.id, status:'pending', verifiedBy:null});
  closeModal(); switchTab('income'); showToast('✓ Payment recorded');
}
function submitExpense(){
  const category = document.getElementById('fExpCategory').value;
  const workerEl = document.getElementById('fExpWorker');
  const worker = workerEl ? workerEl.value.trim() : '';
  const amount = parseFloat(document.getElementById('fExpAmount').value);
  const date = document.getElementById('fExpDate').value;
  const method = document.getElementById('fExpMethod').value;
  const desc = document.getElementById('fExpDesc').value.trim();
  if (!amount || !date){ showToast(t('requiredField')); return; }
  st.expenseTx.push({id:uid('e'), kind:'expense', category, amount, date, method, description:desc, worker, receipt:st.modalData.expReceipt||null, submittedBy:st.activeUser.id, status:'pending', verifiedBy:null});
  closeModal(); switchTab('expenses'); showToast('✓ Expense recorded');
}
function submitMember(){
  const name = document.getElementById('fMemName').value.trim();
  const phone = document.getElementById('fMemPhone').value.replace(/\D/g,'');
  const role = document.getElementById('fMemRole').value;
  const title = document.getElementById('fMemTitle').value.trim();
  if (!name || phone.length<10){ showToast(t('requiredField')); return; }
  if (st.members.some(m=>m.phone===phone || m.phone.slice(-10)===phone.slice(-10))){ showToast(t('numberExists')); return; }
  st.members.push({id:uid('m'), name, phone, role, title:title||'', titleUr:title||''});
  closeModal(); renderContent(); renderHeader(); showToast('✓ ' + name);
}
function removeMember(id){
  const target = getMember(id);
  if (!target) return;
  if (target.id === st.activeUser.id){ showToast(t('cannotRemoveSelf')); return; }
  const adminCount = st.members.filter(m=>m.role==='admin').length;
  if (target.role==='admin' && adminCount<=1){ showToast(t('needOneAdmin')); return; }
  st.members = st.members.filter(m=>m.id!==id);
  renderContent(); renderHeader(); showToast('✓ Removed');
}
function verifyTx(kind, id){
  const list = kind==='income' ? st.incomeTx : st.expenseTx;
  const tx = list.find(x=>x.id===id);
  if (!tx || tx.submittedBy===st.activeUser.id) return;
  tx.status='verified'; tx.verifiedBy = st.activeUser.id;
  if (kind==='income'){ const site = getSite(tx.siteId); if (site && site.status==='completed_pending') site.status='completed_paid'; }
  renderBalanceStrip(); renderNav(); renderContent(); showToast('✓ ' + t('verified'));
}
function rejectTx(kind, id){
  const list = kind==='income' ? st.incomeTx : st.expenseTx;
  const tx = list.find(x=>x.id===id);
  if (!tx || tx.submittedBy===st.activeUser.id) return;
  tx.status='disputed'; tx.verifiedBy = st.activeUser.id;
  renderBalanceStrip(); renderNav(); renderContent(); showToast('✕ ' + t('disputed'));
}
function resetDemo(){
  const fresh = JSON.parse(JSON.stringify(seedData));
  st.members = fresh.members; st.sites = fresh.sites; st.incomeTx = fresh.incomeTx; st.expenseTx = fresh.expenseTx;
  st.activeUser = st.members.find(m=>m.id===st.activeUser.id) || st.members[0];
  renderHeader(); renderBalanceStrip(); renderNav(); renderContent(); showToast('↺ Reset');
}
let toastTimer=null;
function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.display='block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ el.style.display='none'; }, 2200);
}

document.addEventListener('click', (e)=>{
  const el = e.target.closest('[data-action]');
  if (!el){
    if (!e.target.closest('#userMenu')){ const dd=document.getElementById('userDropdown'); if(dd) dd.style.display='none'; }
    return;
  }
  const action = el.dataset.action;
  if (action==='switchTab') switchTab(el.dataset.tab);
  else if (action==='openModal') openModal(el.dataset.modal, el.dataset.site);
  else if (action==='closeModal') closeModal();
  else if (action==='toggleUserMenu'){ const dd=document.getElementById('userDropdown'); dd.style.display = dd.style.display==='block'?'none':'block'; }
  else if (action==='switchUser'){
    st.activeUser = getMember(el.dataset.id);
    if (st.activeTab==='admin' && st.activeUser.role!=='admin') st.activeTab='dashboard';
    document.getElementById('userDropdown').style.display='none';
    renderHeader(); renderNav(); renderContent();
    showToast(t('actingAs')+': '+st.activeUser.name);
  }
  else if (action==='logout'){
    st.loggedIn=false; st.activeUser=null;
    document.getElementById('appView').style.display='none';
    document.getElementById('loginView').style.display='flex';
    document.getElementById('phoneInput').value='';
  }
  else if (action==='dismissBanner'){ st.infoBannerDismissed=true; renderContent(); }
  else if (action==='submitSite') submitSite();
  else if (action==='submitIncome') submitIncome();
  else if (action==='submitExpense') submitExpense();
  else if (action==='submitMember') submitMember();
  else if (action==='removeMember') removeMember(el.dataset.id);
  else if (action==='verifyTx') verifyTx(el.dataset.kind, el.dataset.id);
  else if (action==='rejectTx') rejectTx(el.dataset.kind, el.dataset.id);
  else if (action==='viewReceipt'){ st.modalData.viewSrc = el.dataset.src; st.modalOpen='receipt'; document.getElementById('modalOverlay').style.display='flex'; renderModal(); }
  else if (action==='extractIncome') runExtraction('inc');
  else if (action==='extractExpense') runExtraction('exp');
  else if (action==='resetDemo') resetDemo();
});
document.addEventListener('change', (e)=>{
  if (e.target.id==='fExpCategory'){ const g=document.getElementById('workerFieldGroup'); if(g) g.style.display = e.target.value==='wages' ? 'block':'none'; }
  if (e.target.id==='incFileInput') handleFileSelect(e,'inc');
  if (e.target.id==='expFileInput') handleFileSelect(e,'exp');
});
document.getElementById('modalOverlay').addEventListener('click', (e)=>{ if (e.target.id==='modalOverlay') closeModal(); });

applyLangUI();
</script>
